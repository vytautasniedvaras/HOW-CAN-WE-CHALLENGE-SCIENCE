<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BYO — Projected Cube</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #ffffff;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial;
      cursor: pointer;
    }
    #scene { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }
  </style>
</head>
<body>
  <canvas id="scene"></canvas>

  <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
  <script src="https://unpkg.com/three@0.128.0/examples/js/controls/TransformControls.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dat-gui/0.7.9/dat.gui.min.js"></script>
  <script src="word-pairings.js"></script>
  <script>
  (function () {

    /* ================================================================
       CONFIG — also editable live via the GUI panel (top-right)
       ================================================================ */
    const CONFIG = {
      // --- the invisible cube ---
      cubeSize:      1.15,   // base half-extent of the cube (world units; the gizmo scales on top)
      strength:      1.35,   // how far the text is pushed onto the cube's front faces
      maxLift:       2.6,    // clamp on the forward push (keeps big scales from flinging text at the camera)
      edgeBand:      0.6,    // seam width where projected text eases back to flat
      facingCut:     0.2,    // drop triangles steeper than this (kills the edge-on glow; keeps colour flat)

      // --- motion (mouse-driven "heading", with momentum into a slow idle spin) ---
      paused:        false,  // freeze ALL motion (gizmo still works)
      driveGain:     0.0016, // how hard mouse movement turns the cube (rad per px-of-velocity)
      buildup:       1.6,    // how fast movement re-engages "heading to" (per s) — low = slow buildup
      decay:         0.9,    // how fast it lets go once movement stops (per s)
      slowSpin:      0.30,   // idle spin speed it keeps coasting at along the last axis (rad/s)
      responsiveness:3.0,    // momentum: how quickly angular velocity follows the target
      maxDriveSpeed: 2.6,    // clamp on the heading angular speed (rad/s)

      // --- word interaction ---
      wordThreshold: 55,     // px of horizontal travel over a line to change its word

      // --- quality ---
      renderScale:   1.5,    // super-sampling factor (higher = crisper, costs GPU)

      // --- text (auto-shrinks per line so it always fits the width) ---
      texResolution: 3072,   // width in px of the rendered text texture (higher = sharper)
      textSize:      0.118,  // base line height as a fraction of the text-canvas height
      leftMargin:    0.04,   // left/right inset as a fraction of width
      letterSpacing: -0.03,  // letter spacing in em (negative = tighter)
      wordSpacing:   0.0,    // extra spacing at spaces, in em
      lineSpacing:   1.02,   // line-height multiplier
      autoCycle:     0.0,    // seconds between automatic word changes (0 = off)

      // --- helpers ---
      showGuide:     true    // show the wireframe cube + gizmo
    };
    /* ================================================================ */

    // how much bigger the text plane is than the visible frustum (1.0 = exactly
    // the screen, so the left margin maps to the real screen edge)
    const PLANE_OVERSCAN = 1.0;

    const data  = window.WORD_DATA;
    const nouns = data.nouns;

    // ---------- SDG colour palette ----------
    const sdgColors = [
      '#E5233D', '#DDA73A', '#4CA146', '#C5192D', '#EF402C', '#27BFE6',
      '#FBC412', '#A31C44', '#F26A2D', '#E01483', '#F89D2A', '#BF8D2C',
      '#407F46', '#1F97D4', '#59BA48', '#126A9F', '#13496B'
    ];
    const randColor = () => sdgColors[Math.floor(Math.random() * sdgColors.length)];
    const contrast  = ex => { const a = sdgColors.filter(c => c !== ex); return a[Math.floor(Math.random() * a.length)]; };

    // ---------- content state ----------
    let nounIndex = 0, verbIndex = 0;
    let nounColor = randColor(), verbColor = contrast(nounColor);

    // ================================================================
    //  TEXT TEXTURE  — three flat title lines on a TRANSPARENT canvas
    // ================================================================
    const texCanvas = document.createElement('canvas');
    const tctx = texCanvas.getContext('2d');
    const texture = new THREE.CanvasTexture(texCanvas);
    // trilinear + anisotropic filtering removes the glyph-edge aliasing when the
    // projection minifies/tilts the text. premultiplyAlpha keeps mip-map edges
    // from bleeding (no dark halo on the transparent border).
    texture.premultiplyAlpha = true;
    texture.minFilter = THREE.LinearMipmapLinearFilter;
    texture.magFilter = THREE.LinearFilter;
    texture.generateMipmaps = true;
    texture.wrapS = texture.wrapT = THREE.ClampToEdgeWrapping;

    function sizeTextCanvas() {
      const aspect = window.innerWidth / window.innerHeight;
      texCanvas.width  = Math.round(CONFIG.texResolution);
      texCanvas.height = Math.round(CONFIG.texResolution / aspect);
    }

    function drawText() {
      const W = texCanvas.width, H = texCanvas.height;
      // fully transparent background — ONLY the glyphs get any alpha
      tctx.clearRect(0, 0, W, H);

      const n    = nouns[nounIndex];
      const verb = n.verbs[verbIndex % n.verbs.length].toUpperCase();
      const lines = [
        [ { t: 'BYO',      c: '#000' }, { t: n.word,   c: nounColor } ],
        [ { t: 'HOW CAN ', c: '#000' }, { t: n.plural, c: nounColor } ],
        [ { t: verb + ' ', c: verbColor }, { t: 'SCIENCE', c: '#000' } ]
      ];

      const baseFont = Math.round(H * CONFIG.textSize);
      const lineH    = baseFont * CONFIG.lineSpacing;
      const marginX  = W * CONFIG.leftMargin;
      const avail    = W - marginX * 2;        // usable width (symmetric inset)
      tctx.textBaseline = 'middle';
      tctx.textAlign = 'left';

      const setFont = (px) => {
        tctx.font = `800 ${px}px Inter, Arial, sans-serif`;
        if ('letterSpacing' in tctx) tctx.letterSpacing = `${(CONFIG.letterSpacing * px).toFixed(2)}px`;
        if ('wordSpacing'   in tctx) tctx.wordSpacing   = `${(CONFIG.wordSpacing   * px).toFixed(2)}px`;
      };
      const widthOf = (segs) => segs.reduce((w, s) => w + tctx.measureText(s.t).width, 0);

      const blockH = lineH * lines.length;
      let y = (H - blockH) / 2 + lineH / 2;

      for (const segs of lines) {
        setFont(baseFont);
        let w = widthOf(segs);
        if (w > avail) { setFont(Math.floor(baseFont * avail / w)); }  // shrink this line to fit
        let x = marginX;
        for (const s of segs) {
          tctx.fillStyle = s.c;
          tctx.fillText(s.t, x, y);
          x += tctx.measureText(s.t).width;
        }
        y += lineH;
      }
      texture.needsUpdate = true;
    }

    function rebuildTexture() { sizeTextCanvas(); drawText(); }

    function cycleNoun() {
      nounIndex = (nounIndex + 1) % nouns.length;
      nounColor = randColor(); verbIndex = 0; verbColor = contrast(nounColor);
      drawText();
    }
    function cycleVerb() {
      verbIndex = (verbIndex + 1) % nouns[nounIndex].verbs.length;
      verbColor = contrast(nounColor);
      drawText();
    }

    // which of the 3 lines (0,1,2) is the cursor near, in screen space?
    // Uses the flat text layout (lines centred as a block); -1 if none.
    function hoverLine(py) {
      const f = CONFIG.textSize * CONFIG.lineSpacing;   // line height as a fraction of canvas height
      const sH = window.innerHeight;
      const half = 0.62 * f * PLANE_OVERSCAN;  // vertical tolerance (screen fraction)
      const t = py / sH;
      for (let i = 0; i < 3; i++) {
        const fy = 0.5 - 1.5 * f + f * (i + 0.5);          // canvas-fraction of line i centre
        const sy = 0.5 - (0.5 - fy) * PLANE_OVERSCAN;      // -> screen-fraction
        if (Math.abs(t - sy) < half) return i;
      }
      return -1;
    }

    // ================================================================
    //  THREE.JS SCENE
    // ================================================================
    const canvasEl = document.getElementById('scene');
    const gl2 = canvasEl.getContext('webgl2', { antialias: true, alpha: true, premultipliedAlpha: true });
    const renderer = new THREE.WebGLRenderer(gl2
      ? { canvas: canvasEl, context: gl2, antialias: true, alpha: true }
      : { canvas: canvasEl, antialias: true, alpha: true });
    const MAX_ANISO = renderer.capabilities.getMaxAnisotropy();
    texture.anisotropy = MAX_ANISO;
    function applyPixelRatio() {
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2) * CONFIG.renderScale);
    }
    applyPixelRatio();

    const scene  = new THREE.Scene();
    const CAM_FOV = 45, CAM_DIST = 6;
    const camera = new THREE.PerspectiveCamera(CAM_FOV, 1, 0.1, 100);
    camera.position.set(0, 0, CAM_DIST);
    camera.lookAt(0, 0, 0);

    // --- the cube as a transformable object (driven by the gizmo) ---
    const cube = new THREE.Object3D();      // gizmo target; its world matrix defines the cube
    scene.add(cube);

    // visible wireframe guide that exactly tracks the invisible cube
    let guide = null;
    function buildGuide() {
      if (guide) { guide.geometry.dispose(); cube.remove(guide); }
      const g = new THREE.EdgesGeometry(new THREE.BoxGeometry(CONFIG.cubeSize * 2, CONFIG.cubeSize * 2, CONFIG.cubeSize * 2));
      guide = new THREE.LineSegments(g, new THREE.LineBasicMaterial({ color: 0xbfc6cc, transparent: true, opacity: 0.55 }));
      guide.visible = CONFIG.showGuide;
      cube.add(guide);
    }

    // --- displacement shader (now uses the cube's full inverse matrix) ---
    const vertexShader = `
      uniform mat4  uCubeInv;   // inverse of the cube's world matrix (T * R * S)
      uniform vec3  uHalf;      // cube half-extents (before the gizmo scale)
      uniform float uStrength;
      uniform float uEdgeBand;
      uniform float uMaxLift;
      varying vec2  vUv;
      varying vec3  vWorld;

      void main() {
        vec3 wp = (modelMatrix * vec4(position, 1.0)).xyz;

        // World column through this vertex, parameterised by world-Z (= t):
        //   P(t) = (wp.x, wp.y, t)  ->  cube space: uCubeInv * P(t)
        vec3 lo = (uCubeInv * vec4(wp.x, wp.y, 0.0, 1.0)).xyz;  // local origin (t = 0)
        vec3 ld =  mat3(uCubeInv) * vec3(0.0, 0.0, 1.0);        // local direction per unit t

        vec3 safe = vec3(
          abs(ld.x) < 1e-5 ? 1e-5 : ld.x,
          abs(ld.y) < 1e-5 ? 1e-5 : ld.y,
          abs(ld.z) < 1e-5 ? 1e-5 : ld.z
        );

        vec3 t1 = (-uHalf - lo) / safe;
        vec3 t2 = ( uHalf - lo) / safe;
        vec3 tmin = min(t1, t2);
        vec3 tmax = max(t1, t2);
        float tlo = max(max(tmin.x, tmin.y), tmin.z);
        float thi = min(min(tmax.x, tmax.y), tmax.z);

        float z = wp.z;
        if (thi > tlo) {
          float chord = thi - tlo;
          float mask  = smoothstep(0.0, uEdgeBand, chord);
          float lift  = min(thi * uStrength, uMaxLift);   // clamp so big scales don't fling text forward
          z = mix(wp.z, lift, mask);
        }

        vUv = uv;
        vWorld = vec3(wp.x, wp.y, z);
        gl_Position = projectionMatrix * viewMatrix * vec4(wp.x, wp.y, z, 1.0);
      }
    `;

    const fragmentShader = `
      uniform sampler2D uTex;
      uniform vec3 uCamPos;
      uniform float uFacingCut;
      varying vec2 vUv;
      varying vec3 vWorld;
      void main() {
        vec4 c = texture2D(uTex, vUv);
        if (c.a < 0.02) discard;          // transparent everywhere except the glyphs

        // Drop triangles the displacement has stretched edge-on to the camera
        // (the "wall" smears at the silhouette). Hard cut -> no translucent
        // fade, so the surviving text keeps a FLAT, fully-opaque colour.
        vec3 n = normalize(cross(dFdx(vWorld), dFdy(vWorld)));
        vec3 v = normalize(uCamPos - vWorld);
        if (abs(dot(n, v)) < uFacingCut) discard;

        gl_FragColor = vec4(c.rgb, c.a);
      }
    `;

    const uniforms = {
      uTex:      { value: texture },
      uCamPos:   { value: new THREE.Vector3(0, 0, CAM_DIST) },
      uFacingCut:{ value: CONFIG.facingCut },
      uMaxLift:  { value: CONFIG.maxLift },
      uCubeInv:  { value: new THREE.Matrix4() },
      uHalf:     { value: new THREE.Vector3(CONFIG.cubeSize, CONFIG.cubeSize, CONFIG.cubeSize) },
      uStrength: { value: CONFIG.strength },
      uEdgeBand: { value: CONFIG.edgeBand }
    };

    const material = new THREE.ShaderMaterial({
      uniforms, vertexShader, fragmentShader,
      transparent: true, side: THREE.FrontSide, depthWrite: false
    });
    material.extensions = { derivatives: true };   // for dFdx/dFdy (WebGL1)

    let plane = null;
    function buildPlane() {
      if (plane) { plane.geometry.dispose(); scene.remove(plane); }
      const aspect = window.innerWidth / window.innerHeight;
      const visH = 2 * CAM_DIST * Math.tan((CAM_FOV * Math.PI / 180) / 2);
      const visW = visH * aspect;
      const W = visW * PLANE_OVERSCAN, H = visH * PLANE_OVERSCAN;
      const segX = 240, segY = Math.max(40, Math.round(240 / aspect));
      plane = new THREE.Mesh(new THREE.PlaneGeometry(W, H, segX, segY), material);
      scene.add(plane);
    }

    // ================================================================
    //  GIZMO (TransformControls) + motion compositing
    // ================================================================
    // The gizmo edits a "rest" transform; accumulated motion (motionSpin) is
    // layered on top so the wireframe + shader always agree with the gizmo.
    const basePos   = new THREE.Vector3(0, 0, 0);
    const baseQuat  = new THREE.Quaternion();
    const baseScale = new THREE.Vector3(1, 1, 1);

    const motionSpin = new THREE.Quaternion();   // integrated rotation applied on top of base
    let dragging = false;

    const tc = new THREE.TransformControls(camera, renderer.domElement);
    tc.setSpace('local');
    tc.attach(cube);
    scene.add(tc);

    tc.addEventListener('dragging-changed', (e) => {
      dragging = e.value;
      if (!dragging) {
        // bake the gizmo result into the rest transform, reset the accumulator
        basePos.copy(cube.position);
        baseQuat.copy(cube.quaternion);
        baseScale.copy(cube.scale);
        motionSpin.identity();
      }
    });

    // ---- mouse velocity (the "heading to" driver) ----
    const mouse = { x: 0, y: 0, px: 0, py: 0, moved: false, has: false };
    window.addEventListener('mousemove', (e) => {
      if (!mouse.has) { mouse.px = e.clientX; mouse.py = e.clientY; mouse.has = true; }
      mouse.x = e.clientX; mouse.y = e.clientY; mouse.moved = true;
    });

    // ---- motion state ----
    let engage   = 0;                                  // 0 = idle coast, 1 = fully heading to mouse
    const spinAxis = new THREE.Vector3(0, 1, 0);       // axis from the last heading interaction
    const wVec    = new THREE.Vector3(0, CONFIG.slowSpin, 0); // current angular velocity (has momentum)
    const driveW  = new THREE.Vector3();               // instantaneous mouse-driven angular velocity
    const targetW = new THREE.Vector3();
    const tmpAxis = new THREE.Vector3();
    const dQuat   = new THREE.Quaternion();

    // returns {vx, vy} this frame and clears the moved flag
    function mouseVelocity() {
      let vx = 0, vy = 0;
      if (mouse.moved) {
        vx = mouse.x - mouse.px; vy = mouse.y - mouse.py;
        mouse.px = mouse.x; mouse.py = mouse.y; mouse.moved = false;
      }
      return { vx, vy };
    }

    function applyMotion(dt, vx, vy) {
      if (dragging) return;                            // gizmo owns the transform while dragging
      cube.position.copy(basePos);
      cube.scale.copy(baseScale);

      if (!CONFIG.paused) {
        const speed = Math.hypot(vx, vy);

        // trackball-style drive: horizontal move -> turn about Y, vertical -> about X
        driveW.set(-vy, vx, 0).multiplyScalar(CONFIG.driveGain / Math.max(dt, 1e-3));
        if (driveW.length() > CONFIG.maxDriveSpeed) driveW.setLength(CONFIG.maxDriveSpeed);

        // engagement builds up with sustained movement, decays when still
        const moving = speed > 0.4;
        const rate = moving ? CONFIG.buildup : CONFIG.decay;
        engage += ((moving ? 1 : 0) - engage) * (1 - Math.exp(-rate * dt));

        // the last heading direction becomes the axis it keeps coasting around
        if (driveW.lengthSq() > 1e-4) spinAxis.copy(driveW).normalize();

        // target velocity: heading-to while engaged, otherwise keep coasting along
        // the last axis (never fully stops) -> "continue in that direction".
        targetW.copy(driveW).multiplyScalar(engage)
               .addScaledVector(spinAxis, CONFIG.slowSpin * (1.0 - engage));

        // momentum: ease the actual angular velocity toward the target
        wVec.lerp(targetW, 1 - Math.exp(-CONFIG.responsiveness * dt));

        const ang = wVec.length() * dt;
        if (ang > 1e-7) {
          dQuat.setFromAxisAngle(tmpAxis.copy(wVec).normalize(), ang);
          motionSpin.premultiply(dQuat);             // accumulate in world space
        }
      }

      cube.quaternion.multiplyQuaternions(motionSpin, baseQuat);
    }

    // ---- hover-to-change words (horizontal gesture over a line) ----
    let gLine = -1, gAccum = 0;
    function handleWordGesture(vx, vy) {
      if (dragging) return;
      const line = hoverLine(mouse.y);
      if (line !== gLine) { gLine = line; gAccum = 0; }
      if (line < 0 || Math.abs(vx) <= Math.abs(vy)) return;   // need horizontal-dominant motion on a line
      gAccum += vx;
      if (Math.abs(gAccum) > CONFIG.wordThreshold) {
        if (line === 2) cycleVerb();                 // verb line — independent
        else            cycleNoun();                 // noun + plural lines — linked
        gAccum = 0;
      }
    }

    // ================================================================
    //  INTERACTION
    // ================================================================
    // every word change also switches the gizmo to a different widget
    // change words on click — but ignore clicks that were gizmo drags
    let suppressClick = false;
    tc.addEventListener('mouseDown', () => { suppressClick = true; });
    window.addEventListener('click', () => {
      if (dragging || suppressClick) { suppressClick = false; return; }
      cycleNoun();
    });

    // Blender-style gizmo shortcuts: G = grab/move, R = rotate, S = scale
    window.addEventListener('keydown', (e) => {
      if (e.key === 'g' || e.key === 'G') tc.setMode('translate');
      else if (e.key === 'r' || e.key === 'R') tc.setMode('rotate');
      else if (e.key === 's' || e.key === 'S') tc.setMode('scale');
      else if (e.key === 'h' || e.key === 'H') toggleGui();
      else if (e.code === 'Space') { CONFIG.paused = !CONFIG.paused; e.preventDefault(); }
    });

    // ================================================================
    //  RENDER LOOP
    // ================================================================
    const clock = new THREE.Clock();
    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.05);

      if (CONFIG.autoCycle > 0 && !CONFIG.paused) {
        animate._t = (animate._t || 0) + dt;
        if (animate._t >= CONFIG.autoCycle) { animate._t = 0; cycleNoun(); }
      }

      const { vx, vy } = mouseVelocity();
      handleWordGesture(vx, vy);
      applyMotion(dt, vx, vy);
      cube.updateMatrixWorld();
      uniforms.uCubeInv.value.copy(cube.matrixWorld).invert();
      uniforms.uHalf.value.set(CONFIG.cubeSize, CONFIG.cubeSize, CONFIG.cubeSize);
      uniforms.uStrength.value = CONFIG.strength;
      uniforms.uEdgeBand.value = CONFIG.edgeBand;
      uniforms.uFacingCut.value = CONFIG.facingCut;
      uniforms.uMaxLift.value = CONFIG.maxLift;

      renderer.render(scene, camera);
    }

    // ================================================================
    //  RESIZE
    // ================================================================
    function resize() {
      const w = window.innerWidth, h = window.innerHeight;
      applyPixelRatio();
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      rebuildTexture();
      buildPlane();
    }
    window.addEventListener('resize', resize);

    // ---- init ----
    buildGuide();
    rebuildTexture();
    buildPlane();
    resize();
    tc.setMode('scale');          // start with the gizmo selected, in scale mode
    animate();

    // ================================================================
    //  GUI  (hidden by default — press H to toggle)
    // ================================================================
    const gui = new dat.GUI({ width: 310 });
    let guiVisible = false;
    function toggleGui() {
      guiVisible = !guiVisible;
      gui.domElement.style.display = guiVisible ? '' : 'none';
    }
    gui.domElement.style.display = 'none';

    const fCube = gui.addFolder('Invisible cube');
    fCube.add(CONFIG, 'cubeSize', 0.4, 2.4, 0.01).name('size').onChange(buildGuide);
    fCube.add(CONFIG, 'strength', 0.5, 3.5, 0.01).name('projection depth');
    fCube.add(CONFIG, 'maxLift', 0.5, 4.0, 0.05).name('max forward push');
    fCube.add(CONFIG, 'edgeBand', 0.05, 1.5, 0.01).name('seam softness');
    fCube.add(CONFIG, 'facingCut', 0.0, 0.6, 0.01).name('edge cutoff');
    fCube.add(CONFIG, 'showGuide').name('show guide + gizmo').onChange(v => {
      guide.visible = v; tc.enabled = v; tc.visible = v;
    });
    fCube.open();

    const fMotion = gui.addFolder('Motion (mouse heading)');
    fMotion.add(CONFIG, 'paused').name('pause (freeze)').listen();
    fMotion.add(CONFIG, 'driveGain', 0.0002, 0.006, 0.0001).name('heading strength');
    fMotion.add(CONFIG, 'buildup', 0.3, 6, 0.1).name('engage buildup');
    fMotion.add(CONFIG, 'decay', 0.1, 4, 0.1).name('engage decay');
    fMotion.add(CONFIG, 'slowSpin', 0, 1.2, 0.01).name('idle coast speed');
    fMotion.add(CONFIG, 'responsiveness', 0.5, 8, 0.1).name('momentum');
    fMotion.add(CONFIG, 'maxDriveSpeed', 0.5, 6, 0.1).name('max heading speed');
    fMotion.add(CONFIG, 'wordThreshold', 10, 150, 1).name('word change travel');
    fMotion.open();

    const fGizmo = gui.addFolder('Gizmo mode');
    const gizmoActions = {
      move:  () => tc.setMode('translate'),
      rotate:() => tc.setMode('rotate'),
      scale: () => tc.setMode('scale'),
      reset: () => {
        basePos.set(0, 0, 0); baseQuat.identity(); baseScale.set(1, 1, 1);
        motionSpin.identity(); engage = 0; spinAxis.set(0, 1, 0);
        cube.position.set(0, 0, 0); cube.quaternion.identity(); cube.scale.set(1, 1, 1);
      }
    };
    fGizmo.add(gizmoActions, 'move').name('move (G)');
    fGizmo.add(gizmoActions, 'rotate').name('rotate (R)');
    fGizmo.add(gizmoActions, 'scale').name('scale (S)');
    fGizmo.add(gizmoActions, 'reset').name('reset transform');
    fGizmo.open();

    const fText = gui.addFolder('Text');
    fText.add(CONFIG, 'texResolution', 1024, 8192, 256).name('texture res (px)').onChange(rebuildTexture);
    fText.add(CONFIG, 'textSize', 0.05, 0.22, 0.002).name('text size').onChange(drawText);
    fText.add(CONFIG, 'leftMargin', 0.0, 0.25, 0.005).name('left margin').onChange(drawText);
    fText.add(CONFIG, 'letterSpacing', -0.12, 0.2, 0.005).name('letter spacing').onChange(drawText);
    fText.add(CONFIG, 'wordSpacing', -0.1, 0.6, 0.01).name('word spacing').onChange(drawText);
    fText.add(CONFIG, 'lineSpacing', 0.7, 1.6, 0.01).name('line spacing').onChange(drawText);
    fText.add(CONFIG, 'autoCycle', 0, 6, 0.5).name('auto-change (s)');
    fText.open();

    const fQual = gui.addFolder('Quality');
    fQual.add(CONFIG, 'renderScale', 1.0, 2.5, 0.25).name('super-sampling').onChange(() => { applyPixelRatio(); resize(); });
    fQual.open();
  })();
  </script>
</body>
</html>
